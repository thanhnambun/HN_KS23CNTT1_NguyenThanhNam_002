
services:

  # ========== PostgreSQL Database ==========
  postgres:
    image: postgres:15
    container_name: rikkei_postgres
    restart: always
    environment:
      POSTGRES_USER: rikkei
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: rikkei_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d rikkei_prod -U rikkei"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rikkei_network

  # ========== Spring Boot Backend ==========
  backend:
    image: nambun265/rikkei-be:latest
    container_name: rikkei_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9999/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - rikkei_network

  # ========== Nginx Reverse Proxy ==========
  nginx:
    image: nginx:alpine
    container_name: rikkei_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - rikkei_network

volumes:
  postgres_data:

networks:
  rikkei_network:
    driver: bridge